<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projeto | Benny Soluções Web</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: "Inter", sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
    }
    .projeto-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.75rem 1rem;
      background: linear-gradient(180deg, #0a0a0a 0%, #000 100%);
      border-bottom: 1px solid rgba(255, 184, 0, 0.35);
      z-index: 10;
    }
    .btn-voltar {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      background: #ffb800;
      color: #000;
      font-size: 0.875rem;
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
      transition: background 0.2s ease, box-shadow 0.2s ease;
    }
    .btn-voltar:hover {
      background: #ffc933;
      box-shadow: 0 0 20px rgba(255, 184, 0, 0.4);
    }
    .projeto-bar__acoes {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      min-width: 0;
    }
    .projeto-bar__titulo {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.75);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .btn-nova-aba {
      flex-shrink: 0;
      font-size: 0.75rem;
      font-weight: 600;
      color: #ffb800;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s ease;
    }
    .btn-nova-aba:hover { border-bottom-color: #ffb800; }
    .projeto-frame-wrap {
      flex: 1;
      min-height: 0;
      position: relative;
    }
    .projeto-frame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #111;
    }
    @media (min-width: 640px) {
      .projeto-bar { padding: 0.85rem 1.5rem; }
      .projeto-bar__titulo { font-size: 0.875rem; }
    }
  </style>
</head>
<body>
  <header class="projeto-bar">
    <a href="https://bennysolucoesweb.vercel.app/" class="btn-voltar" aria-label="Voltar para a página inicial da Benny Soluções Web">
      <span aria-hidden="true">←</span>
      Voltar para Benny
    </a>
    <div class="projeto-bar__acoes">
      <p class="projeto-bar__titulo" id="projetoTitulo">Carregando projeto…</p>
      <a id="linkNovaAba" href="#" target="_blank" rel="noopener noreferrer" class="btn-nova-aba">Abrir em nova aba</a>
    </div>
  </header>

  <div class="projeto-frame-wrap">
    <iframe id="projetoFrame" class="projeto-frame" title="Visualização do projeto" loading="lazy"></iframe>
  </div>

  <script>
    const BENNY_HOME = "https://bennysolucoesweb.vercel.app/";

    const projetos = {
      "uber-vip": {
        titulo: "Site Uber VIP",
        url: "https://uber-vip-afonso.vercel.app/"
      },
      igreja: {
        titulo: "Página para Igreja",
        url: "https://igrejaccmv.com.br/"
      },
      cardapio: {
        titulo: "Cardápio Digital",
        url: "https://hamburgueria-da-vila.vercel.app/"
      }
    };

    const params = new URLSearchParams(window.location.search);
    const id = params.get("p");
    const projeto = projetos[id];

    const frame = document.getElementById("projetoFrame");
    const titulo = document.getElementById("projetoTitulo");
    const linkNovaAba = document.getElementById("linkNovaAba");

    if (!projeto) {
      window.location.replace(BENNY_HOME + "#portfolio");
    } else {
      document.title = projeto.titulo + " | Benny Soluções Web";
      titulo.textContent = projeto.titulo;
      linkNovaAba.href = projeto.url;
      frame.src = projeto.url;
    }
  </script>
</body>
</html>
